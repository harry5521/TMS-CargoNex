{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page</title>

  <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

  <div class="sidebar">
    <ul class="sidebar-menu">

      <li class="side-bar-item {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
        <a href="{% url 'core:dashboard' %}">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" />
          </svg>
          Dashboard
        </a>
      </li>

      <li class="side-bar-item {% if request.resolver_match.url_name == 'builty_list' %}active{% endif %}">
        <a href="{% url 'builty:builty_list' %}">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M6 2h9l5 5v15H6z" />
          </svg>
          Builty (LR)
        </a>
      </li>

      <li class="side-bar-item {% if request.resolver_match.url_name == 'trip_list' %}active{% endif %}">
        <a href="{% url 'trips:trip_list' %}">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M3 13h13V6H3v7zm13 0h5l-2-3h-3v3zM5 18a2 2 0 100-4 2 2 0 000 4zm12 0a2 2 0 100-4 2 2 0 000 4z" />
          </svg>
          Trips & Dispatch
        </a>
      </li>

      <li class="side-bar-item {% if request.resolver_match.url_name == 'customers-list' %}active{% endif %}">
        <a href="{% url 'customers:customers-list' %}">
          <svg class="icon" viewBox="0 0 24 24">
            <path
              d="M16 11c1.66 0 3-1.34 3-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zM8 11c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.67 0-8 1.34-8 4v3h16v-3c0-2.66-5.33-4-8-4zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45v3h6v-3c0-2.66-5.33-4-7-4z" />
          </svg>
          Customers
        </a>
      </li>

      <li class="side-bar-item {% if request.resolver_match.url_name == 'drivers_view' %}active{% endif %}">
        <a href="{% url 'drivers:drivers_view' %}">
          <svg class="icon" viewBox="0 0 24 24">
            <path
              d="M16 11c1.66 0 3-1.34 3-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zM8 11c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.67 0-8 1.34-8 4v3h16v-3c0-2.66-5.33-4-8-4zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45v3h6v-3c0-2.66-5.33-4-7-4z" />
          </svg>
          Drivers
        </a>
      </li>

      <li class="side-bar-item {% if request.resolver_match.url_name == 'vehicles_view' %}active{% endif %}">
        <a href="{% url 'vehicles:vehicles_view' %}">
          <svg class="icon" viewBox="0 0 24 24">
            <path
              d="M16 11c1.66 0 3-1.34 3-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zM8 11c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.67 0-8 1.34-8 4v3h16v-3c0-2.66-5.33-4-8-4zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45v3h6v-3c0-2.66-5.33-4-7-4z" />
          </svg>
          Vehicles
        </a>
      </li>

      <li class="side-bar-item {% if request.resolver_match.url_name == 'general-expenses' %}active{% endif %}">
        <a href="{% url 'accounts:general-expenses' %}">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M12 1L3 5v6c0 5 3.8 9.74 9 11 5.2-1.26 9-6 9-11V5l-9-4z" />
          </svg>
          General Expenses
        </a>
      </li>

      <li class="side-bar-item {% if request.resolver_match.url_name == 'accounts' %}active{% endif %}">
        <a href="{% url 'accounts:accounts' %}">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M4 4h16v4H4zM4 10h16v10H4z" />
          </svg>
          Accounts
        </a>
      </li>

      <li class="side-bar-item {% if request.resolver_match.url_name == 'payments_view' %}active{% endif %}">
        <a href="{% url 'payments:payments_view' %}">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M2 6h20v12H2zM2 10h20" />
          </svg>
          Payments
        </a>
      </li>

      <li class="side-bar-item">
        <a href="#">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M3 3v18h18M7 14l3-3 3 2 5-5" />
          </svg>
          Reports
        </a>
      </li>

    </ul>

    <div class="sidebar-footer">

      <a href="{% url 'authsystem:logout' %}" class="footer-content">

        <img src="{% static 'Images/logout.png' %}" class="logout-img" alt="logout">

        <span>Sign Out</span>

      </a>

    </div>
  </div>

  <script src="{% static 'js/include.js' %}"></script>

</body>

</html>
