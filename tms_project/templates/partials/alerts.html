<!-- templates/partials/alerts.html -->
<style>
@keyframes slideIn {
    from { opacity: 0; transform: translate(-50%, -80px); }
    to { opacity: 1; transform: translate(-50%, 0); }
}
</style>

{% if messages %}
    {% for message in messages %}
        
        {% if message.tags == 'error' %}
            <div class="django-custom-popup" style="
                position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
                min-width: 450px; max-width: 600px;
                background: rgba(254, 242, 242, 0.95); 
                border: 1px solid #F87171;
                color: #991B1B; 
                backdrop-filter: blur(8px); padding: 16px 20px; border-radius: 12px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 14px; z-index: 9999;
                font-size: 15px; font-weight: 500; animation: slideIn 0.4s ease;
            ">
                <div style="width: 32px; height: 32px; border-radius: 50%; background: #FEE2E2; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;">❌</div>
                <div style="flex-grow: 1;">{{ message }}</div>
            </div>

        {% elif message.tags == 'warning' %}
            <div class="django-custom-popup" style="
                position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
                min-width: 450px; max-width: 600px;
                background: rgba(255, 251, 235, 0.95); 
                border: 1px solid #FBBF24;
                color: #92400E; 
                backdrop-filter: blur(8px); padding: 16px 20px; border-radius: 12px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 14px; z-index: 9999;
                font-size: 15px; font-weight: 500; animation: slideIn 0.4s ease;
            ">
                <div style="width: 32px; height: 32px; border-radius: 50%; background: #FEF3C7; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;">⚠️</div>
                <div style="flex-grow: 1;">{{ message }}</div>
            </div>

        {% elif message.tags == 'info' %}
            <div class="django-custom-popup" style="
                position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
                min-width: 450px; max-width: 600px;
                background: rgba(239, 246, 255, 0.95); 
                border: 1px solid #60A5FA;
                color: #1E40AF; 
                backdrop-filter: blur(8px); padding: 16px 20px; border-radius: 12px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 14px; z-index: 9999;
                font-size: 15px; font-weight: 500; animation: slideIn 0.4s ease;
            ">
                <div style="width: 32px; height: 32px; border-radius: 50%; background: #DBEAFE; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;">ℹ️</div>
                <div style="flex-grow: 1;">{{ message }}</div>
            </div>

        {% else %} {# Default to Success #}
            <div class="django-custom-popup" style="
                position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
                min-width: 450px; max-width: 600px;
                background: rgba(240, 253, 244, 0.95); 
                border: 1px solid #4ADE80;
                color: #166534; 
                backdrop-filter: blur(8px); padding: 16px 20px; border-radius: 12px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 14px; z-index: 9999;
                font-size: 15px; font-weight: 500; animation: slideIn 0.4s ease;
            ">
                <div style="width: 32px; height: 32px; border-radius: 50%; background: #DCFCE7; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;">✅</div>
                <div style="flex-grow: 1;">{{ message }}</div>
            </div>
        {% endif %}

    {% endfor %}
{% endif %}

<script>
    // AUTO REMOVE ALL POPUPS
    setTimeout(() => {
        const popups = document.querySelectorAll(".django-custom-popup");
        popups.forEach(popup => {
            popup.style.transition = "all 0.5s ease";
            popup.style.opacity = "0";
            popup.style.transform = "translate(-50%, -80px)";
            setTimeout(() => popup.remove(), 500);
        });
    }, 4000);
</script>
